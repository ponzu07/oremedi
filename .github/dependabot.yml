version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      svelte:
        patterns:
          - "@sveltejs/*"
          - "svelte"
          - "svelte-check"
      vite:
        patterns:
          - "vite"
          - "vitest"
          - "@vite-pwa/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
